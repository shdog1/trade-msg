app:
  timezone: Asia/Shanghai
  report_time: "18:00"
  data_ready_time: "09:00"
  skip_non_trading_day: true
  report_root: reports
  dry_run_output: reports/latest.html

market:
  main_board_prefixes:
    - "600"
    - "601"
    - "603"
    - "605"
    - "000"
    - "001"
    - "002"
    - "003"
  exclude_name_keywords:
    - "ST"
    - "*ST"
    - "\u9000"
  min_turnover_amount: 300000000
  max_candidates: 8

scoring:
  market_environment: 0.15
  leader_strength: 0.25
  historical_shape: 0.30
  intraday_confirmation: 0.20
  liquidity_risk: 0.10

notify:
  channel: email
  title_prefix: "A-share short-term recap"
  cache_max_age_hours: 18

database:
  engine: mysql
  auto_create_database: true
